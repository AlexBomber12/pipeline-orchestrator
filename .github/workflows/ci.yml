name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Prepare /data runtime root
        run: |
          sudo mkdir -p /data/repos /data/uploads
          sudo chown -R "$(id -u):$(id -g)" /data
      - run: pip install -r requirements.txt
      - run: bash scripts/ci.sh

  integration:
    runs-on: ubuntu-latest
    needs: unit
    concurrency:
      group: integration-testbed-shared
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - id: testbed-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TESTBED_APP_ID }}
          private-key: ${{ secrets.TESTBED_APP_PRIVATE_KEY }}
          owner: AlexBomber12
          repositories: pipeline-orchestrator-testbed

      - name: Verify gh auth
        env:
          GH_TOKEN: ${{ steps.testbed-token.outputs.token }}
        run: gh auth status

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt -r requirements-test.txt

      - run: playwright install --with-deps chromium

      - name: Build test stack image
        run: docker compose -f docker-compose.test.yml build

      - name: Initialize codex-auth-test volume
        run: bash scripts/init-test-volume.sh

      - name: Seed gh auth for in-container shim
        env:
          TESTBED_TOKEN: ${{ steps.testbed-token.outputs.token }}
        run: |
          mkdir -p tests/e2e/data/auth/gh tests/e2e/data/repos tests/e2e/data/uploads
          cat > tests/e2e/data/auth/gh/hosts.yml <<EOF
          github.com:
              user: x-access-token
              oauth_token: ${TESTBED_TOKEN}
              git_protocol: https
          EOF
          chmod 600 tests/e2e/data/auth/gh/hosts.yml
          sudo chown -R 1000:1000 tests/e2e/data/auth tests/e2e/data/repos tests/e2e/data/uploads

      - name: Bring up test stack
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Verify shim is mounted in daemon-test
        run: |
          actual=$(docker compose -f docker-compose.test.yml exec -T daemon-test which claude)
          if [ "$actual" != "/usr/local/bin/claude" ]; then
            echo "ERROR: shim not mounted; daemon-test which claude returned: $actual" >&2
            echo "Expected /usr/local/bin/claude. Check docker-compose.test.yml volume mounts and PATH env." >&2
            exit 1
          fi
          echo "OK: shim mounted at $actual"

      - name: Run e2e tests
        env:
          GH_TOKEN: ${{ steps.testbed-token.outputs.token }}
        run: pytest tests/e2e/ -v

      - name: Capture stack logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs > stack-logs.txt 2>&1 || true
          cat stack-logs.txt || true

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-evidence
          path: |
            tests/e2e/evidence/
            stack-logs.txt
          retention-days: 14
          if-no-files-found: ignore

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
