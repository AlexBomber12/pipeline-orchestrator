repositories:
- url: https://github.com/AlexBomber12/pipeline-orchestrator.git
  branch: main
  auto_merge: true
  poll_interval_sec: 60
daemon:
  poll_interval_sec: 60
  review_timeout_min: 60
  auto_fallback: true
  hung_fallback_codex_review: true
  error_handler_use_ai: true
  claude_model: opus
  fix_idle_timeout_sec: 1800
  fix_no_push_cap: 3
  fix_poll_interval_sec: 30
  coder_terminate_grace_sec: 5
  planned_pr_timeout_sec: 900
  coder_priority:
    codex: 81
    claude: 76
  exploration_epsilon: 0.15
  rate_limit_pause_percent: 90
  github_api_pause_threshold_percent: 5
  github_api_slowdown_threshold_percent: 20
  github_api_slowdown_multiplier: 5
web:
  host: 0.0.0.0
  port: 8000
auth:
  claude_config_dir: /data/auth/claude
  gh_config_dir: /data/auth/gh
