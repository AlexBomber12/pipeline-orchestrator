services:
  web:
    build: .
    entrypoint: ["bash", "scripts/entrypoint.sh"]
    command: uvicorn src.web.app:app --host 0.0.0.0 --port 8000 --reload
    user: "1000:1000"
    mem_limit: 2g
    ports:
      - "${WEB_PORT:-8800}:8000"
    volumes:
      - .:/app
      - ./data:/data
    environment:
      REDIS_URL: redis://redis:6379/0
      CLAUDE_CONFIG_DIR: /data/auth/claude
      GH_CONFIG_DIR: /data/auth/gh
      HOME: /data/auth
    restart: unless-stopped
    depends_on:
      - redis

  daemon:
    build: .
    command: python -m src.daemon.main
    user: "1000:1000"
    mem_limit: 8g
    volumes:
      - .:/app:ro
      - ./data:/data
      - codex-auth:/home/runner/.codex
    environment:
      REDIS_URL: redis://redis:6379/0
      CLAUDE_CONFIG_DIR: /data/auth/claude
      GH_CONFIG_DIR: /data/auth/gh
      HOME: /data/auth
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    mem_limit: 1g
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  codex-auth:
  redis_data:
