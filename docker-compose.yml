services:
  web:
    build: .
    command: uvicorn src.web.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${WEB_PORT:-8800}:8000"
    volumes:
      # Writable: the settings page mutates config.yml via
      # src.config.save_config (atomic rename-into-place).
      - ./config.yml:/app/config.yml
      - ./data:/data
      - .:/app
    environment:
      REDIS_URL: redis://redis:6379/0
      # Mirror the daemon's auth dirs so ``/api/auth-status`` probes the
      # same credential location the daemon actually uses. Without these
      # the dashboard reports "not authorized" even when the daemon is
      # logged in, because the web container would fall back to its own
      # home directory. ``src.web.app`` also reads these paths from
      # ``config.yml`` as a belt-and-suspenders fallback.
      CLAUDE_CONFIG_DIR: /data/auth/claude
      GH_CONFIG_DIR: /data/auth/gh
    depends_on:
      - redis

  daemon:
    build: .
    command: python -m src.daemon.main
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/data
    environment:
      REDIS_URL: redis://redis:6379/0
      CLAUDE_CONFIG_DIR: /data/auth/claude
      GH_CONFIG_DIR: /data/auth/gh
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  redis_data:
