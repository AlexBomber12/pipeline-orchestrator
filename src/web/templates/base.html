<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pipeline Orchestrator{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        document.addEventListener('htmx:configRequest', function () {});
        document.addEventListener('htmx:beforeSwap', function (evt) {
            const status = evt.detail.xhr.status;
            if (status === 404 || status === 422 || status === 503) {
                evt.detail.shouldSwap = true;
                evt.detail.isError = false;
            }
        });
    </script>

    <link rel="icon" id="favicon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2312121a'/><text x='16' y='21' text-anchor='middle' font-family='monospace' font-size='12' font-weight='bold' fill='%2322d3ee'>PO</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'surface-1': '#0a0a0f',
                        'surface-2': '#12121a',
                        'surface-3': '#1a1a25',
                        'accent': '#22d3ee',
                        'ok': '#34d399',
                        'warn': '#fbbf24',
                        'fail': '#f87171',
                        'hung': '#a78bfa',
                    },
                    fontFamily: {
                        'sans': ['"DM Sans"', 'system-ui', 'sans-serif'],
                        'mono': ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
                    },
                },
            },
        };
    </script>

    <style>
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
        }

        .font-mono,
        code,
        pre {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .pulse-dot {
            animation: pulse-dot 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-surface-1 text-gray-200 min-h-screen">
    <nav class="border-b border-white/5 bg-surface-2">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-md bg-accent/10 border border-accent/30 flex items-center justify-center">
                    <span class="font-mono text-accent text-sm font-semibold">PO</span>
                </div>
                <h1 class="text-lg font-semibold tracking-tight">Pipeline Orchestrator</h1>
            </div>
            <div class="flex items-center gap-6">
                <a href="/"
                   class="text-sm font-medium {% if title == 'Settings' %}text-gray-400 hover:text-gray-200{% else %}text-accent{% endif %}">
                    Dashboard
                </a>
                <a href="/settings"
                   class="text-sm font-medium {% if title == 'Settings' %}text-accent{% else %}text-gray-400 hover:text-gray-200{% endif %}">
                    Settings
                </a>
                <div id="clock" class="font-mono text-sm text-gray-400">--:--:--</div>
            </div>
        </div>
    </nav>

    <div hx-get="/partials/redis-banner" hx-trigger="every 10s" hx-swap="innerHTML" id="redis-banner">
        {% include "components/redis_banner.html" %}
    </div>

    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        (function () {
            const el = document.getElementById('clock');
            function tick() {
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                const ss = String(now.getSeconds()).padStart(2, '0');
                el.textContent = `${hh}:${mm}:${ss}`;
            }
            tick();
            setInterval(tick, 1000);
        })();
    </script>

    <script>
        function formatTimestamps() {
            document.querySelectorAll('[data-ts]').forEach(el => {
                const ts = el.dataset.ts;
                if (!ts) return;
                const dt = new Date(ts);
                if (isNaN(dt)) return;
                const diffMin = (Date.now() - dt.getTime()) / 60000;
                if (diffMin < 1) el.textContent = 'just now';
                else if (diffMin < 60) el.textContent = Math.round(diffMin) + ' min ago';
                else if (diffMin < 1440) el.textContent = Math.round(diffMin / 60) + 'h ago';
                else el.textContent = dt.toLocaleDateString([], {month: 'short', day: 'numeric'});
            });
        }
        document.addEventListener('DOMContentLoaded', formatTimestamps);
        document.body.addEventListener('htmx:afterSwap', formatTimestamps);
    </script>

    <script>
        (function() {
            const originalTitle = document.title;
            let blinking = false;
            let blinkInterval = null;

            const normalFavicon = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%2312121a"/><text x="16" y="21" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="%2322d3ee">PO</text></svg>`;
            const alertFavicon = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%2312121a"/><text x="16" y="21" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="%2322d3ee">PO</text><circle cx="26" cy="6" r="5" fill="%23f87171"/></svg>`;

            function setFavicon(href) {
                const link = document.getElementById('favicon');
                if (link) link.href = href;
            }

            function checkAlerts() {
                fetch('/api/states')
                    .then(r => r.json())
                    .then(states => {
                        const hasAlert = states.some(s =>
                            s.state === 'ERROR' || s.state === 'HUNG'
                        );
                        if (hasAlert && !blinking) {
                            startBlink();
                        } else if (!hasAlert && blinking) {
                            stopBlink();
                        }
                    })
                    .catch(() => {});
            }

            function startBlink() {
                blinking = true;
                setFavicon(alertFavicon);
                let show = true;
                blinkInterval = setInterval(() => {
                    document.title = show ? 'ALERT - Pipeline Orchestrator' : originalTitle;
                    show = !show;
                }, 1500);
            }

            function stopBlink() {
                blinking = false;
                if (blinkInterval) {
                    clearInterval(blinkInterval);
                    blinkInterval = null;
                }
                document.title = originalTitle;
                setFavicon(normalFavicon);
            }

            setInterval(checkAlerts, 10000);
            checkAlerts();
        })();
    </script>
</body>
</html>
