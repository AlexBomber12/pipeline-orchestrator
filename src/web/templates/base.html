<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>{% block title %}Pipeline Orchestrator{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        document.addEventListener('htmx:configRequest', function () {});
        document.addEventListener('htmx:beforeSwap', function (evt) {
            const status = evt.detail.xhr.status;
            if (status === 400 || status === 404 || status === 422 || status === 503) {
                evt.detail.shouldSwap = true;
                evt.detail.isError = false;
            }
        });
    </script>

    <link rel="icon" id="favicon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2312121a'/><text x='16' y='21' text-anchor='middle' font-family='monospace' font-size='12' font-weight='bold' fill='%2322d3ee'>PO</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <script>
        (function () {
            const STORAGE_KEY = 'theme';
            let theme = 'dark';
            let storedTheme = null;

            try {
                storedTheme = localStorage.getItem(STORAGE_KEY);
            } catch (_error) {}

            if (storedTheme === 'light' || storedTheme === 'dark') {
                theme = storedTheme;
            } else if (
                window.matchMedia &&
                window.matchMedia('(prefers-color-scheme: light)').matches
            ) {
                theme = 'light';
            }

            document.documentElement.dataset.theme = theme;
            document.documentElement.style.colorScheme = theme;
        })();
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'surface-1': '#0a0a0f',
                        'surface-2': '#12121a',
                        'surface-3': '#1a1a25',
                        'accent': '#22d3ee',
                        'ok': '#34d399',
                        'warn': '#fbbf24',
                        'fail': '#f87171',
                        'hung': '#a78bfa',
                    },
                    fontFamily: {
                        'sans': ['"DM Sans"', 'system-ui', 'sans-serif'],
                        'mono': ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
                    },
                },
            },
        };
    </script>

    <style>
        :root,
        html[data-theme="dark"] {
            --bg-0: #0a0a0f;
            --bg-1: #12121a;
            --bg-2: #1a1a25;
            --bg-2-rgb: 26 26 37;
            --text-0: #f5f7fb;
            --text-1: #d1d5db;
            --text-2: #9ca3af;
            --text-3: #6b7280;
            --text-4: #4b5563;
            --border-soft: rgba(255, 255, 255, 0.05);
            --border-strong: rgba(255, 255, 255, 0.1);
            --neutral-rgb: 107 114 128;
            --accent: #22d3ee;
            --accent-rgb: 34 211 238;
            --ok: #34d399;
            --warn: #fbbf24;
            --fail: #f87171;
            --hung: #a78bfa;
            --log-bg: #020617;
            --log-fg: #4ade80;
        }

        html[data-theme="light"] {
            --bg-0: #f5f7fb;
            --bg-1: #ffffff;
            --bg-2: #e7ebf3;
            --bg-2-rgb: 231 235 243;
            --text-0: #111827;
            --text-1: #1f2937;
            --text-2: #475569;
            --text-3: #64748b;
            --text-4: #94a3b8;
            --border-soft: rgba(15, 23, 42, 0.08);
            --border-strong: rgba(15, 23, 42, 0.14);
            --neutral-rgb: 100 116 139;
            --accent: #0891b2;
            --accent-rgb: 8 145 178;
            --ok: #059669;
            --warn: #b45309;
            --fail: #dc2626;
            --hung: #7c3aed;
            --log-bg: #e2e8f0;
            --log-fg: #166534;
        }

        html {
            background-color: var(--bg-0);
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background-color: var(--bg-0);
            color: var(--text-1);
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        .font-mono,
        code,
        pre {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
        }

        .bg-surface-1 {
            background-color: var(--bg-0) !important;
        }

        .bg-surface-2 {
            background-color: var(--bg-1) !important;
        }

        .bg-surface-3,
        .bg-surface-3\/40,
        .bg-surface-3\/60 {
            background-color: rgb(var(--bg-2-rgb) / 1) !important;
        }

        .bg-surface-3\/40 {
            background-color: rgb(var(--bg-2-rgb) / 0.4) !important;
        }

        .bg-surface-3\/60 {
            background-color: rgb(var(--bg-2-rgb) / 0.6) !important;
        }

        .bg-accent\/10 {
            background-color: rgb(var(--accent-rgb) / 0.1) !important;
        }

        .bg-accent\/20 {
            background-color: rgb(var(--accent-rgb) / 0.2) !important;
        }

        .border-white\/5 {
            border-color: var(--border-soft) !important;
        }

        .border-white\/10 {
            border-color: var(--border-strong) !important;
        }

        .divide-white\/5 > :not([hidden]) ~ :not([hidden]) {
            border-color: var(--border-soft) !important;
        }

        .border-accent\/30 {
            border-color: rgb(var(--accent-rgb) / 0.3) !important;
        }

        .border-accent\/40 {
            border-color: rgb(var(--accent-rgb) / 0.4) !important;
        }

        .text-accent {
            color: var(--accent) !important;
        }

        .text-accent\/70 {
            color: rgb(var(--accent-rgb) / 0.7) !important;
        }

        .text-white,
        .text-gray-100,
        .text-gray-200 {
            color: var(--text-0) !important;
        }

        .text-gray-300 {
            color: var(--text-1) !important;
        }

        .text-gray-400 {
            color: var(--text-2) !important;
        }

        .text-gray-500 {
            color: var(--text-3) !important;
        }

        .text-gray-600,
        .placeholder\:text-gray-600::placeholder {
            color: var(--text-3) !important;
        }

        .bg-gray-500 {
            background-color: rgb(var(--neutral-rgb) / 1) !important;
        }

        .bg-gray-500\/10 {
            background-color: rgb(var(--neutral-rgb) / 0.1) !important;
        }

        .border-gray-500\/30 {
            border-color: rgb(var(--neutral-rgb) / 0.3) !important;
        }

        .bg-ok {
            background-color: var(--ok) !important;
        }

        .bg-ok\/10 {
            background-color: color-mix(in srgb, var(--ok) 10%, transparent) !important;
        }

        .text-ok {
            color: var(--ok) !important;
        }

        .border-ok\/30 {
            border-color: color-mix(in srgb, var(--ok) 30%, transparent) !important;
        }

        .bg-warn {
            background-color: var(--warn) !important;
        }

        .bg-warn\/10 {
            background-color: color-mix(in srgb, var(--warn) 10%, transparent) !important;
        }

        .text-warn {
            color: var(--warn) !important;
        }

        .border-warn\/30 {
            border-color: color-mix(in srgb, var(--warn) 30%, transparent) !important;
        }

        .bg-fail {
            background-color: var(--fail) !important;
        }

        .text-fail {
            color: var(--fail) !important;
        }

        .text-fail\/80 {
            color: color-mix(in srgb, var(--fail) 80%, transparent) !important;
        }

        .text-hung {
            color: var(--hung) !important;
        }

        .bg-black {
            background-color: var(--log-bg) !important;
        }

        .text-green-400 {
            color: var(--log-fg) !important;
        }

        .hover\:bg-surface-3:hover {
            background-color: rgb(var(--bg-2-rgb) / 1) !important;
        }

        .hover\:bg-accent\/10:hover {
            background-color: rgb(var(--accent-rgb) / 0.1) !important;
        }

        .hover\:bg-accent\/20:hover {
            background-color: rgb(var(--accent-rgb) / 0.2) !important;
        }

        .hover\:border-white\/10:hover {
            border-color: var(--border-strong) !important;
        }

        .hover\:border-accent\/30:hover {
            border-color: rgb(var(--accent-rgb) / 0.3) !important;
        }

        .hover\:border-accent\/40:hover {
            border-color: rgb(var(--accent-rgb) / 0.4) !important;
        }

        .hover\:text-gray-200:hover {
            color: var(--text-0) !important;
        }

        .hover\:text-accent:hover {
            color: var(--accent) !important;
        }

        .focus\:border-accent:focus {
            border-color: var(--accent) !important;
        }

        /* Shared hover treatments for interactive elements. */
        .primary-interactive {
            transition-property: color, background-color, border-color;
            transition-duration: 150ms;
            transition-timing-function: ease;
        }

        .primary-interactive:hover {
            border-color: rgb(var(--accent-rgb) / 0.5) !important;
            background-color: color-mix(in srgb, var(--text-0) 5%, transparent) !important;
        }

        .secondary-interactive {
            transition: color 150ms ease;
        }

        .secondary-interactive:hover {
            color: var(--accent) !important;
        }

        .pulse-dot {
            opacity: 1;
            transition: opacity 1s ease-in-out;
        }

        .pulse-dot.dim {
            opacity: 0.3;
        }
    </style>
</head>
<body class="bg-surface-1 text-gray-200 min-h-screen">
    <nav class="border-b border-white/5 bg-surface-2">
        <div class="max-w-7xl mx-auto flex flex-col gap-3 px-4 py-3 sm:flex-row sm:items-center sm:justify-between sm:px-6 sm:py-4">
            <div class="flex min-w-0 items-center gap-3">
                <div class="w-9 h-9 rounded-md bg-accent/10 border border-accent/30 flex items-center justify-center">
                    <span class="font-mono text-accent text-sm font-semibold">PO</span>
                </div>
                <h1 class="min-w-0 truncate text-base font-semibold tracking-tight sm:text-lg">Pipeline Orchestrator</h1>
            </div>
            <div class="flex w-full flex-wrap items-center justify-between gap-3 sm:w-auto sm:justify-end sm:gap-6">
                <a href="/"
                   class="text-sm font-medium secondary-interactive {% if title == 'Settings' %}text-gray-400{% else %}text-accent{% endif %}">
                    Dashboard
                </a>
                <a href="/settings"
                   class="text-sm font-medium secondary-interactive {% if title == 'Settings' %}text-accent{% else %}text-gray-400{% endif %}">
                    Settings
                </a>
                <button
                    id="theme-toggle"
                    type="button"
                    class="secondary-interactive inline-flex h-10 w-10 items-center justify-center rounded-lg border border-white/10 bg-surface-3/60 text-gray-300"
                    aria-label="Switch to light theme"
                    title="Toggle theme">
                    <span id="theme-icon-dark" aria-hidden="true">☾</span>
                    <span id="theme-icon-light" class="hidden" aria-hidden="true">☀</span>
                </button>
                <div id="clock" class="font-mono text-sm text-gray-400 sm:text-right">--:--:--</div>
            </div>
        </div>
    </nav>

    <div hx-get="/partials/redis-banner" hx-trigger="every 10s" hx-swap="innerHTML" id="redis-banner">
        {% include "components/redis_banner.html" %}
    </div>

    <main class="max-w-7xl mx-auto px-4 py-6 sm:px-6 sm:py-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        (function () {
            const STORAGE_KEY = 'theme';
            const button = document.getElementById('theme-toggle');
            const darkIcon = document.getElementById('theme-icon-dark');
            const lightIcon = document.getElementById('theme-icon-light');

            function applyTheme(theme, persist) {
                document.documentElement.dataset.theme = theme;
                document.documentElement.style.colorScheme = theme;

                if (persist) {
                    try {
                        localStorage.setItem(STORAGE_KEY, theme);
                    } catch (_error) {}
                }

                if (button) {
                    const nextTheme = theme === 'dark' ? 'light' : 'dark';
                    button.setAttribute('aria-label', `Switch to ${nextTheme} theme`);
                    button.setAttribute('title', `Switch to ${nextTheme} theme`);
                }

                if (darkIcon && lightIcon) {
                    darkIcon.classList.toggle('hidden', theme !== 'dark');
                    lightIcon.classList.toggle('hidden', theme !== 'light');
                }
            }

            applyTheme(document.documentElement.dataset.theme || 'dark', false);

            if (button) {
                button.addEventListener('click', function () {
                    const currentTheme = document.documentElement.dataset.theme === 'light'
                        ? 'light'
                        : 'dark';
                    const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    applyTheme(nextTheme, true);
                });
            }
        })();
    </script>

    <script>
        (function () {
            setInterval(() => {
                document.querySelectorAll('.pulse-dot').forEach(dot => dot.classList.toggle('dim'));
            }, 1000);
        })();
    </script>

    <script>
        (function () {
            const el = document.getElementById('clock');
            function tick() {
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                const ss = String(now.getSeconds()).padStart(2, '0');
                el.textContent = `${hh}:${mm}:${ss}`;
            }
            tick();
            setInterval(tick, 1000);
        })();
    </script>

    <script>
        function formatTimestamps() {
            function relativeTime(dt) {
                if (isNaN(dt)) return null;
                const diffMin = (Date.now() - dt.getTime()) / 60000;
                if (diffMin < -1440) return dt.toLocaleString([], {month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'});
                if (diffMin < -60) return 'in ' + Math.round(-diffMin / 60) + 'h';
                if (diffMin < -1) return 'in ' + Math.round(-diffMin) + ' min';
                if (diffMin < 1) return 'just now';
                if (diffMin < 60) return Math.round(diffMin) + ' min ago';
                if (diffMin < 1440) return Math.round(diffMin / 60) + 'h ago';
                return dt.toLocaleDateString([], {month: 'short', day: 'numeric'});
            }
            document.querySelectorAll('[data-ts]').forEach(el => {
                const ts = el.dataset.ts;
                if (!ts) return;
                const text = relativeTime(new Date(ts));
                if (text) el.textContent = text;
            });
            document.querySelectorAll('[data-ts-unix]').forEach(el => {
                const ts = parseInt(el.dataset.tsUnix, 10);
                if (isNaN(ts)) return;
                const text = relativeTime(new Date(ts * 1000));
                if (text) el.textContent = text;
            });
        }
        document.addEventListener('DOMContentLoaded', formatTimestamps);
        document.body.addEventListener('htmx:afterSwap', formatTimestamps);
    </script>

    <script>
        (function() {
            const originalTitle = document.title;
            let blinking = false;
            let blinkInterval = null;

            const normalFavicon = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%2312121a"/><text x="16" y="21" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="%2322d3ee">PO</text></svg>`;
            const alertFavicon = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%2312121a"/><text x="16" y="21" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="%2322d3ee">PO</text><circle cx="26" cy="6" r="5" fill="%23f87171"/></svg>`;

            function setFavicon(href) {
                const link = document.getElementById('favicon');
                if (link) link.href = href;
            }

            function checkAlerts() {
                fetch('/api/states')
                    .then(r => r.json())
                    .then(states => {
                        const hasAlert = states.some(s =>
                            s.state === 'ERROR' || s.state === 'HUNG'
                        );
                        if (hasAlert && !blinking) {
                            startBlink();
                        } else if (!hasAlert && blinking) {
                            stopBlink();
                        }
                    })
                    .catch(() => {});
            }

            function startBlink() {
                blinking = true;
                setFavicon(alertFavicon);
                let show = true;
                blinkInterval = setInterval(() => {
                    document.title = show ? 'ALERT - Pipeline Orchestrator' : originalTitle;
                    show = !show;
                }, 1500);
            }

            function stopBlink() {
                blinking = false;
                if (blinkInterval) {
                    clearInterval(blinkInterval);
                    blinkInterval = null;
                }
                document.title = originalTitle;
                setFavicon(normalFavicon);
            }

            setInterval(checkAlerts, 10000);
            checkAlerts();
        })();
    </script>
</body>
</html>
