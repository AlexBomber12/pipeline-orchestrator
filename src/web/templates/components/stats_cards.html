{# 4 summary cards shown at the top of the dashboard index. #}
{% set alert_classes = 'bg-fail/10 border-fail/20' if stats.alerts > 0 else 'bg-surface-2 border-white/5' %}
<div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
    <div class="rounded-lg border border-white/5 bg-surface-2 p-4">
        <div class="text-white font-semibold text-3xl font-mono">{{ stats.repos }}</div>
        <div class="text-gray-500 text-xs uppercase tracking-wide mt-1">Repos</div>
    </div>
    <div class="rounded-lg border border-white/5 bg-surface-2 p-4">
        <div class="text-white font-semibold text-3xl font-mono">{{ stats.done_today }}</div>
        <div class="text-gray-500 text-xs uppercase tracking-wide mt-1">Done today</div>
    </div>
    <div class="rounded-lg border border-white/5 bg-surface-2 p-4">
        <div class="text-white font-semibold text-3xl font-mono">{{ stats.active }}</div>
        <div class="text-gray-500 text-xs uppercase tracking-wide mt-1">Active</div>
    </div>
    <div class="rounded-lg border {{ alert_classes }} p-4">
        <div class="{% if stats.alerts > 0 %}text-fail{% else %}text-white{% endif %} font-semibold text-3xl font-mono">{{ stats.alerts }}</div>
        <div class="{% if stats.alerts > 0 %}text-fail/80{% else %}text-gray-500{% endif %} text-xs uppercase tracking-wide mt-1">Alerts</div>
    </div>
</div>
