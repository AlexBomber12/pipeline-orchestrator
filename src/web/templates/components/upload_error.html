<div class="relative mt-2 rounded-lg border border-fail/30 bg-fail/10 px-3 py-2 pr-9 text-fail text-xs"
     data-upload-feedback-card>
    <button type="button"
            class="absolute right-2 top-2 text-sm leading-none text-fail/80 hover:text-fail"
            aria-label="Dismiss upload error"
            onclick="this.closest('[data-upload-feedback-card]').remove()">
        ×
    </button>
    <div class="space-y-1">
        {% for line in message_lines %}
        <p>{{ line }}</p>
        {% endfor %}
    </div>
</div>
