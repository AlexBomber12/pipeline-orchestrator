{% extends "base.html" %}

{% block title %}Dashboard - Pipeline Orchestrator{% endblock %}

{% block content %}
<div hx-get="/partials/repo-list" hx-trigger="every 10s" hx-swap="innerHTML" id="repo-grid">
    {% include "components/repo_cards.html" %}
</div>
<div hx-get="/partials/stats" hx-trigger="every 10s" hx-swap="innerHTML" id="status-bar" style="margin-top: 14px;">
    {% include "components/status_bar.html" %}
</div>
<script>
    (function () {
        if (window.repoProgressSSEManager) {
            window.repoProgressSSEManager.scan();
            return;
        }

        const MAX_STREAMS = 8;
        const BASE_DELAY_MS = 1000;
        const MAX_DELAY_MS = 10000;
        const connections = new Map();

        function getRenderedRepos() {
            return Array.from(document.querySelectorAll('[data-repo-card][data-repo]'))
                .map((card) => card.dataset.repo)
                .filter(Boolean);
        }

        function renderProgress(repoName, done, total) {
            const cards = document.querySelectorAll('[data-repo-card][data-repo="' + repoName + '"]');
            const safeTotal = Number.isFinite(total) && total > 0 ? total : 0;
            const safeDone = Number.isFinite(done) ? done : 0;
            const percent = safeTotal > 0
                ? Math.max(0, Math.min(100, (safeDone / safeTotal) * 100))
                : 0;

            cards.forEach((card) => {
                const text = card.querySelector('[data-progress-text]');
                const bar = card.querySelector('[data-progress-bar]');
                if (text) {
                    text.textContent = safeDone + ' / ' + safeTotal + ' done';
                }
                if (bar) {
                    bar.style.width = percent.toFixed(1) + '%';
                }
            });
        }

        function clearConnection(repoName) {
            const entry = connections.get(repoName);
            if (!entry) {
                return;
            }
            if (entry.source) {
                entry.source.close();
            }
            if (entry.timer) {
                window.clearTimeout(entry.timer);
            }
            connections.delete(repoName);
        }

        function scheduleReconnect(repoName) {
            const entry = connections.get(repoName);
            if (!entry) {
                return;
            }
            if (entry.timer) {
                window.clearTimeout(entry.timer);
            }
            const delay = Math.min(entry.delayMs, MAX_DELAY_MS);
            entry.timer = window.setTimeout(function () {
                entry.timer = null;
                connect(repoName);
            }, delay);
            entry.delayMs = Math.min(delay * 2, MAX_DELAY_MS);
        }

        function connect(repoName) {
            let entry = connections.get(repoName);
            if (!entry) {
                entry = {source: null, timer: null, delayMs: BASE_DELAY_MS};
                connections.set(repoName, entry);
            }

            if (entry.source) {
                entry.source.close();
            }
            if (entry.timer) {
                window.clearTimeout(entry.timer);
                entry.timer = null;
            }

            const source = new EventSource('/api/repos/' + encodeURIComponent(repoName) + '/events');
            entry.source = source;

            source.onopen = function () {
                entry.delayMs = BASE_DELAY_MS;
            };

            source.addEventListener('progress_updated', function (event) {
                let payload;
                try {
                    payload = JSON.parse(event.data);
                } catch (_error) {
                    return;
                }
                const data = payload && payload.data ? payload.data : {};
                const done = Number(data.queue_done);
                const total = Number(data.queue_total);
                if (Number.isNaN(done) || Number.isNaN(total)) {
                    return;
                }
                renderProgress(repoName, done, total);
                entry.delayMs = BASE_DELAY_MS;
            });

            source.onerror = function () {
                if (entry.source !== source) {
                    return;
                }
                source.close();
                entry.source = null;
                scheduleReconnect(repoName);
            };
        }

        function scan() {
            const renderedRepos = getRenderedRepos();
            const activeRepos = new Set(renderedRepos.slice(0, MAX_STREAMS));

            activeRepos.forEach(function (repoName) {
                if (!connections.has(repoName)) {
                    connections.set(repoName, {
                        source: null,
                        timer: null,
                        delayMs: BASE_DELAY_MS,
                    });
                }
                const entry = connections.get(repoName);
                if (entry && !entry.source && !entry.timer) {
                    connect(repoName);
                }
            });

            Array.from(connections.keys()).forEach(function (repoName) {
                if (!activeRepos.has(repoName)) {
                    clearConnection(repoName);
                }
            });
        }

        window.repoProgressSSEManager = {scan: scan, renderProgress: renderProgress};
        document.addEventListener('htmx:afterSwap', function (event) {
            if (event.target && event.target.id === 'repo-grid') {
                scan();
            }
        });
        scan();
    })();
</script>
{% endblock %}
