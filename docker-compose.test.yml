services:
  redis-test:
    image: redis:7-alpine
    container_name: pipeline-orchestrator-redis-test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  web-test:
    build: .
    container_name: pipeline-orchestrator-web-test
    command: bash scripts/entrypoint.sh python -m uvicorn src.web.app:app --host 0.0.0.0 --port 8000
    depends_on:
      redis-test:
        condition: service_healthy
    ports:
      - "${TEST_WEB_PORT:-18800}:8000"
    volumes:
      - ./tests/e2e/data:/data
      - codex-auth-test:/data/auth/.codex
      - ./tests/e2e/lib/coder_shim.sh:/usr/local/bin/claude:ro
      - ./tests/e2e/lib/coder_shim.sh:/usr/local/bin/codex:ro
    environment:
      REDIS_URL: redis://redis-test:6379/0
      CLAUDE_CONFIG_DIR: /data/auth/claude
      GH_CONFIG_DIR: /data/auth/gh
      HOME: /data/auth
      PATH: /usr/local/bin:/home/runner/.npm-global/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin
      PO_CONFIG_PATH: /app/config.test.yml
      PO_SHIM_SCENARIO_FILE: /data/shim-scenario

  daemon-test:
    build: .
    container_name: pipeline-orchestrator-daemon-test
    command:
      - bash
      - -c
      - |
        until getent hosts redis-test >/dev/null 2>&1; do
          echo "daemon-test: waiting for redis-test DNS to resolve..."
          sleep 1
        done
        exec bash scripts/entrypoint.sh python -m src.daemon.main
    depends_on:
      redis-test:
        condition: service_healthy
    volumes:
      - ./tests/e2e/data:/data
      - codex-auth-test:/data/auth/.codex
      - ./tests/e2e/lib/coder_shim.sh:/usr/local/bin/claude:ro
      - ./tests/e2e/lib/coder_shim.sh:/usr/local/bin/codex:ro
    environment:
      REDIS_URL: redis://redis-test:6379/0
      CLAUDE_CONFIG_DIR: /data/auth/claude
      GH_CONFIG_DIR: /data/auth/gh
      HOME: /data/auth
      PATH: /usr/local/bin:/home/runner/.npm-global/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin
      PO_CONFIG_PATH: /app/config.test.yml
      PO_SHIM_SCENARIO_FILE: /data/shim-scenario

volumes:
  codex-auth-test:

networks:
  default:
    name: pipeline-orchestrator-test-net
